<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vase Designer</title>
  <style>
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #222;
      --bg-tertiary: #2a2a2a;
      --bg-input: #181818;
      --border: #333;
      --border-focus: #555;
      --text: #ccc;
      --text-label: #aaa;
      --text-muted: #666;
      --accent-sculpt: #4a9eff;
      --accent-draw: #f26363;
      --accent-stick: #ff4a9e;
      --toolbar-w: 280px;
      --radius-sm: 6px;
      --radius-md: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      display: flex;
    }

    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .canvas-area canvas {
      display: block;
    }

    .toolbar {
      width: var(--toolbar-w);
      min-width: var(--toolbar-w);
      height: 100vh;
      background: var(--bg-primary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .toolbar-header {
      padding: 16px 16px 12px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      border-bottom: 1px solid var(--border);
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      padding: 8px;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }

    .mode-tab {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      color: var(--text-label);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }

    .mode-tab:hover {
      background: var(--bg-tertiary);
      color: var(--text);
    }

    .mode-tab.active {
      color: #fff;
      border-color: var(--accent-sculpt);
      background: rgba(74, 158, 255, 0.1);
    }

    .mode-tab.active[data-mode="Draw"] {
      border-color: var(--accent-draw);
      background: rgba(242, 99, 99, 0.1);
    }

    .mode-tab.active[data-mode="Stick"] {
      border-color: var(--accent-stick);
      background: rgba(255, 74, 158, 0.1);
    }

    /* Mode panels */
    .mode-panel {
      display: none;
      padding: 12px;
    }

    .mode-panel.active {
      display: block;
    }

    /* Control groups */
    .control-group {
      margin-bottom: 12px;
    }

    .control-label {
      display: block;
      font-size: 11px;
      color: var(--text-label);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-separator {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    /* Sliders */
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-wrap input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      outline: none;
    }

    .slider-wrap input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: 2px solid var(--border);
    }

    .slider-value {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 28px;
      text-align: right;
    }

    /* Color picker */
    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: none;
      cursor: pointer;
      padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 4px;
    }

    /* Select */
    select {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    select:focus {
      border-color: var(--border-focus);
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toggle.on {
      background: var(--accent-sculpt);
      border-color: var(--accent-sculpt);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle.on::after {
      transform: translateX(16px);
    }

    /* Button */
    .action-btn {
      width: 100%;
      padding: 7px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-focus);
    }

    /* Section title */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      padding-bottom: 4px;
    }

    /* Editor canvas wrappers */
    .editor-wrap {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px;
      margin: 4px 0 8px;
    }

    .editor-label {
      color: var(--text-label);
      font-size: 10px;
      margin-bottom: 4px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .editor-canvas {
      width: 100%;
      border-radius: 4px;
      cursor: crosshair;
      background: #0d0d1a;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .editor-canvas:hover {
      box-shadow: 0 0 12px rgba(74, 158, 255, 0.2);
    }

    /* Sticker gallery */
    .sticker-gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .sticker-thumb {
      aspect-ratio: 1;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      cursor: pointer;
      overflow: hidden;
      padding: 4px;
      transition: border-color 0.15s;
    }

    .sticker-thumb:hover {
      border-color: var(--text-muted);
    }

    .sticker-thumb.selected {
      border-color: var(--accent-stick);
    }

    .sticker-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Scrollbar */
    .toolbar::-webkit-scrollbar {
      width: 6px;
    }

    .toolbar::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .toolbar::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .toolbar::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="canvas-area" id="canvas-area"></div>
  <div class="toolbar" id="toolbar"></div>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.170.0';
    import { OrbitControls } from 'https://esm.sh/three@0.170.0/addons/controls/OrbitControls.js';
    import { RGBELoader } from 'https://esm.sh/three@0.170.0/addons/loaders/RGBELoader.js';

    // =========================================================
    // Phase 3: Reactive Controls System
    // =========================================================

    const controls = (() => {
      const values = {
        toolMode: 'Sculpt',
        vasePreset: 'classic',
        profileSmoothing: 34,
        latheSegments: 64,
        showHandles: true,
        handleThickness: 10,
        baseColor: '#55bf40',
        roughness: 40,
        metalness: 0,
        envMap: 'Sunset',
        wheelSpeed: 25,
        brushSize: 1,
        brushColor: '#f26363',
        brushOpacity: 100,
        eraser: false,
        stickerScale: 61,
        stickerRotation: 0,
        stickerRandomize: true
      };

      const listeners = {};
      const actions = {};

      return {
        get(key) { return values[key]; },
        set(key, value) {
          values[key] = value;
          if (listeners[key]) {
            listeners[key].forEach(fn => fn(value));
          }
        },
        getAll() { return { ...values }; },
        onChange(key, fn) {
          if (!listeners[key]) listeners[key] = [];
          listeners[key].push(fn);
        },
        onAction(name, fn) {
          if (!actions[name]) actions[name] = [];
          actions[name].push(fn);
        },
        fireAction(name) {
          if (actions[name]) {
            actions[name].forEach(fn => fn());
          }
        }
      };
    })();

    // =========================================================
    // Phase 2: Three.js Scene Core
    // =========================================================

    const area = document.getElementById('canvas-area');

    // Renderer
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,
      preserveDrawingBuffer: true
    });
    renderer.setSize(area.clientWidth, area.clientHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    area.appendChild(renderer.domElement);

    // Camera
    const camera = new THREE.PerspectiveCamera(
      40,
      area.clientWidth / area.clientHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.0, 4.0);
    camera.lookAt(0, 0.85, 0);

    // Scene
    const scene = new THREE.Scene();

    // OrbitControls
    const orbitControls = new OrbitControls(camera, renderer.domElement);
    orbitControls.target.set(0, 0.85, 0);
    orbitControls.enableDamping = true;
    orbitControls.dampingFactor = 0.08;
    orbitControls.update();

    // Wheel group — vase + handles rotate together
    const wheelGroup = new THREE.Group();
    scene.add(wheelGroup);

    // HDR environment maps
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();

    const HDR_URLS = {
      Studio: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr',
      Sunset: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/kloofendal_48d_partly_cloudy_puresky_1k.hdr',
      Courtyard: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/courtyard_1k.hdr',
      Night: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/moonlit_golf_1k.hdr'
    };

    function loadEnvironment(name) {
      const url = HDR_URLS[name];
      if (!url) return;

      new RGBELoader().load(
        url,
        (texture) => {
          const envMap = pmrem.fromEquirectangular(texture).texture;
          scene.environment = envMap;
          scene.background = envMap;
          texture.dispose();
        },
        undefined,
        () => {
          // Fallback lighting if HDR fails
          scene.add(new THREE.AmbientLight(0xffffff, 0.5));
          const d1 = new THREE.DirectionalLight(0xffffff, 1.5);
          d1.position.set(3, 5, 3);
          scene.add(d1);
          const d2 = new THREE.DirectionalLight(0x8899bb, 0.5);
          d2.position.set(-3, 3, -3);
          scene.add(d2);
        }
      );
    }

    loadEnvironment(controls.get('envMap'));

    // Expose globals for capture compatibility
    window.renderer = renderer;
    window.scene = scene;
    window.camera = camera;

    // =========================================================
    // Phase 5 & 6: Texture System
    // =========================================================

    const TEX = 2048;
    const raycaster = new THREE.Raycaster();
    const mouseNDC = new THREE.Vector2();

    // Paint layer
    const paintCanvas = document.createElement('canvas');
    paintCanvas.width = TEX;
    paintCanvas.height = TEX;
    const paintCtx = paintCanvas.getContext('2d');

    // Sticker layer
    const stickerCanvas = document.createElement('canvas');
    stickerCanvas.width = TEX;
    stickerCanvas.height = TEX;
    const stickerCtx = stickerCanvas.getContext('2d');

    // Composite layer
    const compositeCanvas = document.createElement('canvas');
    compositeCanvas.width = TEX;
    compositeCanvas.height = TEX;
    const compositeCtx = compositeCanvas.getContext('2d');

    function fillBaseColor(color) {
      paintCtx.fillStyle = color;
      paintCtx.fillRect(0, 0, TEX, TEX);
    }

    fillBaseColor(controls.get('baseColor'));
    compositeCtx.drawImage(paintCanvas, 0, 0);

    const canvasTexture = new THREE.CanvasTexture(compositeCanvas);
    canvasTexture.colorSpace = THREE.SRGBColorSpace;

    function compositeTexture() {
      compositeCtx.clearRect(0, 0, TEX, TEX);
      compositeCtx.drawImage(paintCanvas, 0, 0);
      compositeCtx.drawImage(stickerCanvas, 0, 0);
      canvasTexture.needsUpdate = true;
    }

    // =========================================================
    // Phase 5: Material
    // =========================================================

    const vaseMaterial = new THREE.MeshStandardMaterial({
      map: canvasTexture,
      roughness: controls.get('roughness') / 100,
      metalness: controls.get('metalness') / 100,
      side: THREE.DoubleSide
    });

    // =========================================================
    // Phase 4: Vase Sculpt System
    // =========================================================

    const PRESETS = {
      classic: [
        [0, 0], [0.6, 0], [0.65, 0.05], [0.7, 0.15], [0.75, 0.3],
        [0.8, 0.5], [0.85, 0.7], [0.82, 0.9], [0.7, 1.1], [0.55, 1.3],
        [0.45, 1.5], [0.42, 1.65], [0.45, 1.8], [0.5, 1.9], [0.48, 2],
        [0.35, 2.05], [0, 2.05]
      ],
      tall: [
        [0, 0], [0.4, 0], [0.42, 0.04], [0.45, 0.14], [0.43, 0.35],
        [0.38, 0.56], [0.32, 0.84], [0.28, 1.12], [0.26, 1.4], [0.28, 1.6],
        [0.35, 1.74], [0.38, 1.82], [0.35, 1.9], [0.25, 1.96], [0, 1.96]
      ],
      bowl: [
        [0, 0], [0.3, 0], [0.35, 0.05], [0.6, 0.1], [0.8, 0.2],
        [0.95, 0.35], [1.05, 0.55], [1.08, 0.7], [1.05, 0.85], [1, 0.9],
        [0, 0.9]
      ],
      urn: [
        [0, 0], [0.5, 0], [0.55, 0.05], [0.65, 0.2], [0.8, 0.5],
        [0.9, 0.8], [0.92, 1], [0.85, 1.2], [0.7, 1.4], [0.5, 1.55],
        [0.35, 1.6], [0.3, 1.65], [0.28, 1.7], [0.3, 1.75], [0.35, 1.8],
        [0.3, 1.85], [0, 1.85]
      ],
      bottle: [
        [0, 0], [0.5, 0], [0.55, 0.05], [0.6, 0.13], [0.65, 0.35],
        [0.68, 0.6], [0.65, 0.85], [0.55, 1.05], [0.35, 1.18], [0.2, 1.3],
        [0.18, 1.48], [0.17, 1.7], [0.18, 1.85], [0.2, 1.95], [0.18, 2.0],
        [0.15, 2.05], [0, 2.05]
      ],
      wide: [
        [0, 0], [0.6, 0], [0.65, 0.05], [0.85, 0.15], [1, 0.3],
        [1.1, 0.5], [1.12, 0.7], [1.05, 0.9], [0.9, 1.05], [0.75, 1.15],
        [0.65, 1.2], [0.6, 1.25], [0.55, 1.3], [0, 1.3]
      ]
    };

    const MAX_H = 2.1;
    const MAX_R = 1.2;
    const DRAW_MAX_H = MAX_H * 0.85;

    let currentProfile = [...PRESETS.classic];
    let profileDirty = true;

    // Chaikin subdivision smoothing
    function smooth(points, iterations) {
      let pts = points.map(p => [...p]);
      for (let i = 0; i < iterations; i++) {
        const result = [pts[0]];
        for (let j = 0; j < pts.length - 1; j++) {
          result.push([
            0.75 * pts[j][0] + 0.25 * pts[j + 1][0],
            0.75 * pts[j][1] + 0.25 * pts[j + 1][1]
          ]);
          result.push([
            0.25 * pts[j][0] + 0.75 * pts[j + 1][0],
            0.25 * pts[j][1] + 0.75 * pts[j + 1][1]
          ]);
        }
        result.push(pts[pts.length - 1]);
        pts = result;
      }
      return pts;
    }

    let vaseMesh = null;

    function buildVase() {
      const smoothIterations = Math.round(controls.get('profileSmoothing') / 25);
      const segments = controls.get('latheSegments');
      const smoothed = smooth(currentProfile, smoothIterations);
      const lathePoints = smoothed.map(p => new THREE.Vector2(p[0], p[1]));
      const geometry = new THREE.LatheGeometry(lathePoints, segments);

      if (vaseMesh) {
        vaseMesh.geometry.dispose();
        vaseMesh.geometry = geometry;
      } else {
        vaseMesh = new THREE.Mesh(geometry, vaseMaterial);
        wheelGroup.add(vaseMesh);
      }

      profileDirty = false;
      buildHandles();
    }

    // =========================================================
    // Phase 4.5: Handle System
    // =========================================================

    let handleMeshes = [];
    let handleProfile = [[0, 0.8], [0.3, 0.9], [0.4, 1.1], [0.3, 1.3], [0, 1.4]];
    let handleDirty = true;

    function buildHandles() {
      for (const mesh of handleMeshes) {
        wheelGroup.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      handleMeshes = [];

      if (!controls.get('showHandles') || handleProfile.length < 2) return;

      const thickness = controls.get('handleThickness') / 200;
      const points3D = handleProfile.map(p => new THREE.Vector3(p[0], p[1], 0));
      const curve = new THREE.CatmullRomCurve3(points3D, false, 'catmullrom', 0.5);
      const geometry = new THREE.TubeGeometry(curve, 32, thickness, 12, false);

      for (let i = 0; i < 2; i++) {
        const handleMat = new THREE.MeshStandardMaterial({
          color: controls.get('baseColor'),
          roughness: controls.get('roughness') / 100,
          metalness: controls.get('metalness') / 100,
          side: THREE.DoubleSide
        });
        const mesh = new THREE.Mesh(geometry, handleMat);
        mesh.rotation.y = Math.PI * i;
        wheelGroup.add(mesh);
        handleMeshes.push(mesh);
      }

      handleDirty = false;
    }

    // Build initial vase
    buildVase();

    // =========================================================
    // Phase 6: Paint/Draw System
    // =========================================================

    function getUV(event) {
      if (!vaseMesh) return null;
      const rect = renderer.domElement.getBoundingClientRect();
      mouseNDC.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouseNDC.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouseNDC, camera);
      const hits = raycaster.intersectObject(vaseMesh, false);
      return (hits.length > 0 && hits[0].uv) ? hits[0].uv.clone() : null;
    }

    function paint(uv, size, color, opacity, isEraser) {
      if (!uv) return;
      const px = uv.x * TEX;
      const py = (1 - uv.y) * TEX;
      const radius = size * (TEX / 200);
      const fillColor = isEraser ? controls.get('baseColor') : color;

      paintCtx.save();
      paintCtx.globalAlpha = opacity / 100;

      const gradient = paintCtx.createRadialGradient(px, py, 0, px, py, radius);
      gradient.addColorStop(0, fillColor);
      gradient.addColorStop(0.7, fillColor);
      gradient.addColorStop(1, fillColor + '00');
      paintCtx.fillStyle = gradient;

      paintCtx.beginPath();
      paintCtx.arc(px, py, radius, 0, Math.PI * 2);
      paintCtx.fill();

      // UV wrapping at horizontal seam
      if (px < radius) {
        paintCtx.beginPath();
        paintCtx.arc(px + TEX, py, radius, 0, Math.PI * 2);
        paintCtx.fill();
      } else if (px > TEX - radius) {
        paintCtx.beginPath();
        paintCtx.arc(px - TEX, py, radius, 0, Math.PI * 2);
        paintCtx.fill();
      }

      paintCtx.restore();
      compositeTexture();
    }

    function interpolatedPaint(uv1, uv2, size, color, opacity, isEraser) {
      let dx = uv2.x - uv1.x;
      const dy = uv2.y - uv1.y;

      // Handle UV wrap-around
      if (Math.abs(dx) > 0.5) {
        dx = dx > 0 ? dx - 1 : dx + 1;
      }

      const distance = Math.sqrt(dx * dx + dy * dy);
      const stepSize = size / TEX * 0.3;
      const steps = Math.max(1, Math.ceil(distance / stepSize));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        let u = uv1.x + dx * t;
        if (u < 0) u += 1;
        if (u > 1) u -= 1;
        paint({ x: u, y: uv1.y + dy * t }, size, color, opacity * 0.5, isEraser);
      }
    }

    // =========================================================
    // Phase 7: Sticker/Decal System
    // =========================================================

    const STICKER_PATHS = [
      'stickers/Clay_sticker_04.png',
      'stickers/Clay_sticker_05.png',
      'stickers/Clay_sticker_06.png',
      'stickers/Clay_sticker_07.png',
      'stickers/Clay_sticker_08.png',
      'stickers/Clay_sticker_09.png',
      'stickers/Clay_sticker_010.png',
      'stickers/Clay_sticker_011.png'
    ];

    // Preload sticker images
    const stickerImages = [];
    for (const path of STICKER_PATHS) {
      const img = new Image();
      img.src = path;
      stickerImages.push(img);
    }

    let selectedStickerIndex = 0;

    function placeSticker(uv) {
      if (stickerImages.length === 0) return;

      const randomize = controls.get('stickerRandomize');
      const idx = randomize
        ? Math.floor(Math.random() * stickerImages.length)
        : selectedStickerIndex % stickerImages.length;
      const img = stickerImages[idx];
      if (!img.complete) return;

      let scale = controls.get('stickerScale') / 100;
      let rotation = controls.get('stickerRotation') * Math.PI / 180;

      if (randomize) {
        scale *= 0.5 + Math.random() * 1.0;
        rotation = Math.random() * Math.PI * 2;
      }

      const stickerSize = TEX * 0.1 * scale;
      const px = uv.x * TEX;
      const py = (1 - uv.y) * TEX;

      stickerCtx.save();
      stickerCtx.translate(px, py);
      stickerCtx.rotate(rotation);
      stickerCtx.drawImage(img, -stickerSize / 2, -stickerSize / 2, stickerSize, stickerSize);

      // UV wrapping
      if (px < stickerSize) {
        stickerCtx.drawImage(img,
          -stickerSize / 2 + TEX, -stickerSize / 2,
          stickerSize, stickerSize
        );
      } else if (px > TEX - stickerSize) {
        stickerCtx.drawImage(img,
          -stickerSize / 2 - TEX, -stickerSize / 2,
          stickerSize, stickerSize
        );
      }

      stickerCtx.restore();
      compositeTexture();
    }

    // =========================================================
    // Phase 4.4: Profile Editor
    // =========================================================

    let peCanvas, peCtx;
    let isDrawingProfile = false;
    let drawnProfilePoints = [];

    function profileToCanvas(point, canvasW, canvasH) {
      const margin = 20;
      const usableW = canvasW - margin * 2;
      const usableH = canvasH - margin * 2;
      return [
        margin + (point[0] / MAX_R) * usableW,
        canvasH - margin - (point[1] / MAX_H) * usableH
      ];
    }

    function canvasToProfile(x, y, canvasW, canvasH) {
      const margin = 20;
      const usableW = canvasW - margin * 2;
      const usableH = canvasH - margin * 2;
      return [
        Math.max(0, Math.min(MAX_R, (x - margin) / usableW * MAX_R)),
        Math.max(0, Math.min(DRAW_MAX_H, (canvasH - margin - y) / usableH * MAX_H))
      ];
    }

    function processDrawnPoints(pts) {
      if (pts.length < 2) return currentProfile;

      const sorted = [...pts]
        .sort((a, b) => a[1] - b[1])
        .map(p => [
          Math.max(0, Math.min(p[0], MAX_R)),
          Math.max(0, Math.min(p[1], MAX_H))
        ]);

      const step = Math.max(1, Math.floor(sorted.length / 16));
      const sampled = [];
      for (let i = 0; i < sorted.length; i += step) {
        sampled.push(sorted[i]);
      }
      if (sampled[sampled.length - 1] !== sorted[sorted.length - 1]) {
        sampled.push(sorted[sorted.length - 1]);
      }

      const base = [sampled[0][0], 0];
      const baseAxis = [0, 0];
      const top = sampled[sampled.length - 1];
      const topAxis = [0, top[1]];

      return [baseAxis, base, ...sampled, topAxis];
    }

    function drawProfileEditor() {
      if (!peCanvas) return;
      const w = peCanvas.width;
      const h = peCanvas.height;
      const ctx = peCtx;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, w, h);

      // Grid
      const margin = 20;
      ctx.strokeStyle = '#1a1a3a';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 10; i++) {
        const x = margin + (i / 10) * (w - margin * 2);
        const y = margin + (i / 10) * (h - margin * 2);
        ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, h - margin); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(w - margin, y); ctx.stroke();
      }

      // Axis of revolution (dashed blue)
      ctx.strokeStyle = '#4a9eff44';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(margin, margin);
      ctx.lineTo(margin, h - margin);
      ctx.stroke();
      ctx.setLineDash([]);

      // Max safe height line (dashed green)
      const safeHY = profileToCanvas([0, DRAW_MAX_H], w, h)[1];
      ctx.strokeStyle = '#4aff4a44';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(margin, safeHY);
      ctx.lineTo(w - margin, safeHY);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#4aff4a66';
      ctx.font = '8px sans-serif';
      ctx.fillText('max height', w - margin - 50, safeHY - 3);

      // Danger zone
      const maxHY = profileToCanvas([0, MAX_H], w, h)[1];
      ctx.fillStyle = 'rgba(255, 50, 50, 0.06)';
      ctx.fillRect(margin, maxHY, w - margin * 2, safeHY - maxHY);

      // Draw smoothed profile curve
      if (currentProfile.length > 1) {
        const smoothIter = Math.round(controls.get('profileSmoothing') / 25);
        const smoothed = smooth(currentProfile, smoothIter);

        // Filled area
        ctx.beginPath();
        let first = profileToCanvas(smoothed[0], w, h);
        ctx.moveTo(first[0], first[1]);
        for (let i = 1; i < smoothed.length; i++) {
          const p = profileToCanvas(smoothed[i], w, h);
          ctx.lineTo(p[0], p[1]);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(74, 158, 255, 0.08)';
        ctx.fill();

        // Stroke
        ctx.beginPath();
        ctx.moveTo(first[0], first[1]);
        for (let i = 1; i < smoothed.length; i++) {
          const p = profileToCanvas(smoothed[i], w, h);
          ctx.lineTo(p[0], p[1]);
        }
        ctx.strokeStyle = '#4a9eff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Control points
        for (const p of currentProfile) {
          const [cx, cy] = profileToCanvas(p, w, h);
          ctx.beginPath();
          ctx.arc(cx, cy, 3, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }
      }

      // Labels
      ctx.fillStyle = '#555';
      ctx.font = '9px sans-serif';
      ctx.fillText('\u2190 axis', margin + 2, h - 5);
      ctx.fillText('radius \u2192', w - 60, h - 5);
    }

    function initProfileEditor(container) {
      const wrap = document.createElement('div');
      wrap.className = 'editor-wrap';
      wrap.id = 'pe-wrap';

      const label = document.createElement('div');
      label.className = 'editor-label';
      label.textContent = 'Draw vase profile (right side)';

      peCanvas = document.createElement('canvas');
      peCanvas.width = 220;
      peCanvas.height = 320;
      peCanvas.className = 'editor-canvas';
      peCtx = peCanvas.getContext('2d');

      wrap.appendChild(label);
      wrap.appendChild(peCanvas);
      container.appendChild(wrap);

      peCanvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (controls.get('toolMode') !== 'Sculpt') return;
        peCanvas.setPointerCapture(e.pointerId);
        isDrawingProfile = true;
        drawnProfilePoints = [];
        const rect = peCanvas.getBoundingClientRect();
        const sx = peCanvas.width / rect.width;
        const sy = peCanvas.height / rect.height;
        drawnProfilePoints.push(canvasToProfile(
          (e.clientX - rect.left) * sx,
          (e.clientY - rect.top) * sy,
          peCanvas.width, peCanvas.height
        ));
      });

      peCanvas.addEventListener('pointermove', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDrawingProfile) return;
        const rect = peCanvas.getBoundingClientRect();
        const sx = peCanvas.width / rect.width;
        const sy = peCanvas.height / rect.height;
        drawnProfilePoints.push(canvasToProfile(
          (e.clientX - rect.left) * sx,
          (e.clientY - rect.top) * sy,
          peCanvas.width, peCanvas.height
        ));
        currentProfile = processDrawnPoints(drawnProfilePoints);
        profileDirty = true;
        drawProfileEditor();
      });

      peCanvas.addEventListener('pointerup', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDrawingProfile) return;
        isDrawingProfile = false;
        if (drawnProfilePoints.length > 2) {
          currentProfile = processDrawnPoints(drawnProfilePoints);
          profileDirty = true;
          buildVase();
          drawProfileEditor();
        }
      });

      peCanvas.addEventListener('pointerleave', (e) => {
        e.stopPropagation();
        if (isDrawingProfile) {
          isDrawingProfile = false;
          if (drawnProfilePoints.length > 2) {
            currentProfile = processDrawnPoints(drawnProfilePoints);
            profileDirty = true;
            buildVase();
          }
        }
      });

      drawProfileEditor();
    }

    // =========================================================
    // Phase 4.6: Handle Editor
    // =========================================================

    let heCanvas, heCtx;
    let isDrawingHandle = false;
    let drawnHandlePoints = [];
    let heWrapEl;

    function handleToCanvas(point, canvasW, canvasH) {
      const margin = 15;
      const usableW = canvasW - margin * 2;
      const usableH = canvasH - margin * 2;
      return [
        margin + (point[0] / MAX_R) * usableW,
        canvasH - margin - (point[1] / MAX_H) * usableH
      ];
    }

    function canvasToHandle(x, y, canvasW, canvasH) {
      const margin = 15;
      const usableW = canvasW - margin * 2;
      const usableH = canvasH - margin * 2;
      return [
        Math.max(0, Math.min(MAX_R, (x - margin) / usableW * MAX_R)),
        Math.max(0, Math.min(MAX_H, (canvasH - margin - y) / usableH * MAX_H))
      ];
    }

    function drawHandleEditor() {
      if (!heCanvas) return;
      const w = heCanvas.width;
      const h = heCanvas.height;
      const ctx = heCtx;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, w, h);

      // Grid
      const margin = 15;
      ctx.strokeStyle = '#1a1a3a';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= 10; i++) {
        const x = margin + (i / 10) * (w - margin * 2);
        const y = margin + (i / 10) * (h - margin * 2);
        ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, h - margin); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(w - margin, y); ctx.stroke();
      }

      // Center axis (dashed pink)
      ctx.strokeStyle = '#ff4a9e44';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(margin, margin);
      ctx.lineTo(margin, h - margin);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw handle profile
      if (handleProfile.length > 1) {
        ctx.beginPath();
        const first = handleToCanvas(handleProfile[0], w, h);
        ctx.moveTo(first[0], first[1]);
        for (let i = 1; i < handleProfile.length; i++) {
          const p = handleToCanvas(handleProfile[i], w, h);
          ctx.lineTo(p[0], p[1]);
        }
        ctx.strokeStyle = '#ff4a9e';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Control points
        for (const p of handleProfile) {
          const [cx, cy] = handleToCanvas(p, w, h);
          ctx.beginPath();
          ctx.arc(cx, cy, 3, 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
        }
      }

      // Labels
      ctx.fillStyle = '#555';
      ctx.font = '9px sans-serif';
      ctx.fillText('\u2190 center', margin + 2, h - 5);
      ctx.fillText('width \u2192', w - 60, h - 5);
    }

    function initHandleEditor(container) {
      heWrapEl = document.createElement('div');
      heWrapEl.className = 'editor-wrap';
      heWrapEl.id = 'he-wrap';

      const label = document.createElement('div');

      heCanvas.addEventListener('pointerdown', (e) => {

        isDrawingHandle = true;
        drawnHandlePoints = [];
        const rect = heCanvas.getBoundingClientRect();
        const sx = heCanvas.width / rect.width;
        const sy = heCanvas.height / rect.height;
        drawnHandlePoints.push(canvasToHandle(
          (e.clientX - rect.left) * sx,
          (e.clientY - rect.top) * sy,
          heCanvas.width, heCanvas.height
        ));
      });

      heCanvas.addEventListener('pointermove', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDrawingHandle) return;
        const rect = heCanvas.getBoundingClientRect();
        const sx = heCanvas.width / rect.width;

        drawnHandlePoints.push(canvasToHandle(
          (e.clientX - rect.left) * sx,

        ));

        drawHandleEditor();
      });

      heCanvas.addEventListener('pointerup', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!isDrawingHandle) return;
        isDrawingHandle = false;
        if (drawnHandlePoints.length > 2) {
          handleProfile = [...drawnHandlePoints];
          handleDirty = true;
          buildHandles();
          drawHandleEditor();
        }
      });

      heCanvas.addEventListener('pointerleave', (e) => {
        e.stopPropagation();
        if (isDrawingHandle) {
          isDrawingHandle = false;
          if (drawnHandlePoints.length > 2) {
            handleProfile = [...drawnHandlePoints];
            handleDirty = true;
            buildHandles();
          }
        }

    }

    function createSlider(label, key, min, max, step = 1) {
      const group = document.createElement('div');
      group.className = 'control-group';

      const lbl = document.createElement('label');
      lbl.className = 'control-label';
      lbl.textContent = label;

      const wrap = document.createElement('div');
      wrap.className = 'slider-wrap';

      const input = document.createElement('input');
      input.type = 'range';
      input.min = min;
      input.max = max;
      input.step = step;
      input.value = controls.get(key);

      const valueDisplay = document.createElement('span');
      valueDisplay.className = 'slider-value';
      valueDisplay.textContent = controls.get(key);

      input.addEventListener('input', () => {
        const val = parseFloat(input.value);
        valueDisplay.textContent = val;
        controls.set(key, val);
      });

      controls.onChange(key, (val) => {
        input.value = val;
        valueDisplay.textContent = val;
      });

      wrap.appendChild(input);
      wrap.appendChild(valueDisplay);
      group.appendChild(lbl);

    // Mode switching
    function updateMode(mode) {
      for (const m of MODES) {
        tabElements[m].classList.toggle('active', m === mode);
        panelElements[m].classList.toggle('active', m === mode);
      }

      // OrbitControls: disabled in Draw mode
      orbitControls.enabled = mode !== 'Draw';

      // Cursor
      renderer.domElement.style.cursor =
        mode === 'Draw' ? 'crosshair' :
        mode === 'Stick' ? 'copy' : 'default';

      updateHandleEditorVisibility();
    }

    function updateHandleEditorVisibility() {
      const showH = controls.get('showHandles');
      if (heWrapEl) {
        heWrapEl.style.display = showH ? '' : 'none';
      }
      if (handleThicknessControl) {
        handleThicknessControl.style.display = showH ? '' : 'none';
      }
    }

    controls.onChange('toolMode', updateMode);

    controls.onChange('showHandles', () => {
      handleDirty = true;
      buildHandles();
      updateHandleEditorVisibility();
    });

    updateHandleEditorVisibility();

    // Prevent context menu on canvas
    renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

    // ---- Mouse/Pointer Events ----
    let isPainting = false;
    let lastPaintUV = null;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      const mode = controls.get('toolMode');

      if (mode === 'Draw') {
        isPainting = true;
        const uv = getUV(e);
        if (uv) {
          paint(
            uv,
            controls.get('brushSize'),
            controls.get('brushColor'),
            controls.get('brushOpacity'),
            controls.get('eraser')
          );
          lastPaintUV = uv;
        }
      } else if (mode === 'Stick') {
        const uv = getUV(e);
        if (uv) placeSticker(uv);
      }
    });

    renderer.domElement.addEventListener('pointermove', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouseNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouseNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      const mode = controls.get('toolMode');
      if (mode === 'Draw' && isPainting) {
        const uv = getUV(e);
        if (uv) {
          if (lastPaintUV) {
            interpolatedPaint(
              lastPaintUV, uv,
              controls.get('brushSize'),
              controls.get('brushColor'),
              controls.get('brushOpacity'),
              controls.get('eraser')
            );
          } else {
            paint(
              uv,
              controls.get('brushSize'),
              controls.get('brushColor'),
              controls.get('brushOpacity'),
              controls.get('eraser')
            );
          }
          lastPaintUV = uv;
        }
      }
    });

    renderer.domElement.addEventListener('pointerup', () => {
      isPainting = false;
      lastPaintUV = null;
    });

    renderer.domElement.addEventListener('pointerleave', () => {
      isPainting = false;
      lastPaintUV = null;
    });

    // Continuous painting while rotating (30ms interval)
    setInterval(() => {
      if (!isPainting || controls.get('toolMode') !== 'Draw' || !vaseMesh) return;
      raycaster.setFromCamera(mouseNDC, camera);
      const hits = raycaster.intersectObject(vaseMesh, false);
      if (hits.length > 0 && hits[0].uv) {
        paint(
          hits[0].uv.clone(),
          controls.get('brushSize') * 0.8,
          controls.get('brushColor'),
          controls.get('brushOpacity') * 0.6,
          controls.get('eraser')
        );
      }
    }, 30);

    // =========================================================
    // Control Callbacks (wiring)
    // =========================================================

    controls.onChange('baseColor', (color) => {
      fillBaseColor(color);
      compositeTexture();
      for (const m of handleMeshes) {
        if (m.material) m.material.color.set(color);
      }
    });

    controls.onChange('roughness', (val) => {
      const r = val / 100;
      vaseMaterial.roughness = r;
      for (const m of handleMeshes) {
        if (m.material) m.material.roughness = r;
      }
    });

    controls.onChange('metalness', (val) => {
      const mVal = val / 100;
      vaseMaterial.metalness = mVal;
      for (const m of handleMeshes) {
        if (m.material) m.material.metalness = mVal;
      }
    });

    controls.onChange('envMap', (name) => loadEnvironment(name));

    controls.onChange('vasePreset', (id) => {
      if (PRESETS[id]) {
        currentProfile = [...PRESETS[id]];
        profileDirty = true;
        buildVase();
        drawProfileEditor();
      }
    });

    controls.onChange('profileSmoothing', () => {
      profileDirty = true;
      buildVase();
      drawProfileEditor();
    });

    controls.onChange('latheSegments', () => {
      profileDirty = true;
      buildVase();
    });

    controls.onChange('handleThickness', () => {
      handleDirty = true;
      buildHandles();
    });

    // Actions
    controls.onAction('clearProfile', () => {
      currentProfile = [...PRESETS.classic];
      profileDirty = true;
      buildVase();
      drawProfileEditor();
    });

    controls.onAction('clearTexture', () => {
      fillBaseColor(controls.get('baseColor'));
      stickerCtx.clearRect(0, 0, TEX, TEX);
      compositeTexture();
    });

    controls.onAction('clearHandles', () => {
      handleProfile = [[0, 0.6], [0.4, 0.8], [0.6, 1.0], [0.4, 1.2], [0, 1.4]];
      handleDirty = true;
      buildHandles();
      drawHandleEditor();
    });

    controls.onAction('clearStickers', () => {
      stickerCtx.clearRect(0, 0, TEX, TEX);
      compositeTexture();
    });

    // =========================================================
    // Animation Loop
    // =========================================================

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const speed = controls.get('wheelSpeed') / 100;
      wheelGroup.rotation.y += speed * dt * 2;

      if (profileDirty) buildVase();
      if (handleDirty) buildHandles();

      orbitControls.update();
      renderer.render(scene, camera);
    }

    animate();

    // =========================================================
    // Resize Handler
    // =========================================================

    window.addEventListener('resize', () => {
      camera.aspect = area.clientWidth / area.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(area.clientWidth, area.clientHeight);
    });
  </script>
</body>
</html>
