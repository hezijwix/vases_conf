<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vase Designer</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/neue-haas-grotesk-display-pro">
  <style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #fafafa;
  --bg-tertiary: #f5f5f5;
  --bg-input: #ffffff;
  --border: #e5e5e5;
  --border-focus: #d4d4d4;
  --text: #0a0a0a;
  --text-label: #525252;
  --text-muted: #a3a3a3;
  --accent-sculpt: #5b8def;
  --accent-draw: #d4726e;
  --accent-stick: #c77a9e;
  --toolbar-w: 280px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;
  --clay-font: "Neue Haas Grotesk Display Pro", system-ui, -apple-system, sans-serif;
  --clay-shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --clay-shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --clay-ease: cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: transparent;
  font-family: var(--clay-font);
  font-size: 14px;
  color: var(--text);
  display: flex;
}

.canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.canvas-area canvas {
  display: block;
}

.toolbar {
  width: var(--toolbar-w);
  min-width: var(--toolbar-w);
  height: 100vh;
  background: var(--bg-primary);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

.toolbar-header {
  padding: 16px 16px 12px;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  border-bottom: 1px solid var(--border);
}

.mode-tabs {
  display: flex;
  padding: 8px;
  gap: 5px;
}

.mode-tab {
  flex: 1;
  padding: 8px 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: var(--bg-primary);
  color: var(--text-label);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s var(--clay-ease);
}

.mode-tab:hover {
  background: var(--bg-tertiary);
  color: var(--text);
}

.mode-tab.active {
  color: #fff;
  border-color: #000;
  background: #000;
}

.mode-panel {
  display: none;
  padding: 12px;
}

.mode-panel.active {
  display: block;
}

.control-group {
  margin-bottom: 12px;
}

.control-label {
  display: block;
  font-size: 11px;
  color: var(--text-label);
  margin-bottom: 6px;
  font-weight: 500;
  opacity: 0.7;
}

.control-separator {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
}

.slider-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 6px;
}

.slider-range {
  display: flex;
  align-items: center;
  gap: 2px;
  background: #f0f0f0;
  border-radius: 999px;
  padding: 2px 4px;
}

.slider-range input {
  width: 32px;
  background: transparent;
  border: none;
  padding: 2px 0;
  font-size: 11px;
  font-weight: 500;
  color: #999;
  text-align: center;
  outline: none;
  font-family: inherit;
  -moz-appearance: textfield;
}

.slider-range input::-webkit-outer-spin-button,
.slider-range input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.slider-range input:focus {
  color: #000;
}

.slider-range span {
  font-size: 9px;
  color: #bbb;
}

@keyframes slider-shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-3px); }
  40%, 80% { transform: translateX(3px); }
}

.slider-shake {
  animation: slider-shake 0.3s ease;
}

.slider-wrap {
  position: relative;
  height: 36px;
  border-radius: var(--radius-full);
  background: #E8E8E8;
  overflow: hidden;
  cursor: pointer;
}

.slider-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: #000;
  border-radius: var(--radius-full);
  transition: width 0.05s linear;
  pointer-events: none;
}

.slider-value-overlay {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  pointer-events: none;
  z-index: 2;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.slider-wrap input[type="range"] {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  outline: none;
  cursor: pointer;
  margin: 0;
  z-index: 2;
}

.slider-wrap input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 0;
  height: 0;
}

.slider-wrap input[type="range"]::-moz-range-thumb {
  width: 0;
  height: 0;
  border: none;
}

.slider-value {
  font-size: 11px;
  color: var(--text-muted);
  min-width: 28px;
  text-align: right;
}

input[type="color"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 32px;
  border: 1px solid #efefef;
  border-radius: var(--radius-sm);
  background: none;
  cursor: pointer;
  padding: 2px;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 4px;
}

select {
  width: 100%;
  padding: 8px 28px 8px 10px;
  background: var(--bg-primary);
  border: 1px solid #efefef;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--clay-font);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s var(--clay-ease);
}

select:focus {
  border-color: var(--border-focus);
}

.toggle-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.toggle {
  position: relative;
  width: 32px;
  height: 16px;
  background: #efefef;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s var(--clay-ease);
  border: none;
  flex-shrink: 0;
}

.toggle.on {
  background: #000;
}

.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 12px;
  height: 12px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s var(--clay-ease);
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.toggle.on::after {
  transform: translateX(16px);
}

.action-btn {
  width: 100%;
  padding: 10px 12px;
  background: #ebebeb;
  border: none;
  border-radius: var(--radius-full);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--clay-font);
  cursor: pointer;
  transition: all 0.2s var(--clay-ease);
}

.action-btn:hover {
  background: #e0e0e0;
}

.action-btn:active {
  background: #000;
  color: #fff;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  padding-bottom: 4px;
}

.editor-wrap {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 8px;
  margin: 4px 0 8px;
}

.editor-label {
  color: var(--text-label);
  font-size: 10px;
  margin-bottom: 4px;
  text-align: center;
  font-weight: 500;
  opacity: 0.6;
}

.editor-canvas {
  width: 100%;
  border-radius: 4px;
  cursor: crosshair;
  background: #f5f5f5;
  display: block;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.editor-canvas:hover {
  box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);
}

/* ct-multi-image gallery */
.ct-multi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

.ct-multi-thumb {
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #e8e8e8;
  position: relative;
  cursor: pointer;
}

.ct-multi-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ct-multi-thumb.selected {
  border-color: var(--accent-stick);
  border-width: 2px;
}

.ct-multi-thumb .ct-multi-remove {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 16px;
  height: 16px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
  font-size: 10px;
}

.ct-multi-thumb:hover .ct-multi-remove {
  opacity: 1;
}

.ct-multi-add {
  aspect-ratio: 1;
  border: 2px dashed #d4d4d4;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  cursor: pointer;
  position: relative;
  font-size: 18px;
  transition: border-color 0.2s;
}

.ct-multi-add:hover {
  border-color: #999;
}

.ct-multi-add input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.ct-multi-counter {
  color: #999;
  text-align: right;
  margin-top: 4px;
  font-size: 11px;
}

.toolbar::-webkit-scrollbar {
  width: 6px;
}

.toolbar::-webkit-scrollbar-track {
  background: transparent;
}

.toolbar::-webkit-scrollbar-thumb {
  background: #d4d4d4;
  border-radius: 3px;
}

.toolbar::-webkit-scrollbar-thumb:hover {
  background: #a3a3a3;
}

{

  "canvas_code": "import * as THREE from 'https://esm.sh/three@0.170.0';\nimport { RGBELoader } from 'https://esm.sh/three@0.170.0/addons/loaders/RGBELoader.js';\n\n// =================================================================\n// controls.js\n// =================================================================\n\nconst values = {\n  toolMode: 'Sculpt',\n  vasePreset: 'classic',\n  profileSmoothing: 34,\n  latheSegments: 64,\n  showHandles: true,\n  handleThickness: 10,\n  baseColor: '#55bf40',\n  roughness: 40,\n  metalness: 0,\n  envMap: 'Sunset',\n  wheelSpeed: 25,\n  brushSize: 1,\n  brushColor: '#f26363',\n  brushOpacity: 100,\n  eraser: false,\n  stickerScale: 61,\n  stickerRotation: 0,\n  stickerRandomize: true\n};\n\nconst listeners = {};\nconst actions = {};\n\nconst vaseControls = {\n  get(key) { return values[key]; },\n  set(key, value) {\n    values[key] = value;\n    if (listeners[key]) {\n      listeners[key].forEach(fn => fn(value));\n    }\n  },\n  getAll() { return { ...values }; },\n  onChange(key, fn) {\n    if (!listeners[key]) listeners[key] = [];\n    listeners[key].push(fn);\n  },\n  onAction(name, fn) {\n    if (!actions[name]) actions[name] = [];\n    actions[name].push(fn);\n  },\n  fireAction(name) {\n    if (actions[name]) {\n      actions[name].forEach(fn => fn());\n    }\n  }\n};\n\n// =================================================================\n// engine.js\n// =================================================================\n\nlet renderer, camera, scene, wheelGroup;\n\nlet pmrem;\n\nconst HDR_URLS = {\n  Studio: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr',\n  Sunset: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/kloofendal_48d_partly_cloudy_puresky_1k.hdr',\n  Courtyard: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/courtyard_1k.hdr',\n  Night: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/moonlit_golf_1k.hdr'\n};\n\nfunction loadEnvironment(name) {\n  const url = HDR_URLS[name];\n  if (!url) return;\n\n  new RGBELoader().load(\n    url,\n    (texture) => {\n      const envMap = pmrem.fromEquirectangular(texture).texture;\n      scene.environment = envMap;\n      scene.background = envMap;\n      texture.dispose();\n    },\n    undefined,\n    () => {\n      scene.add(new THREE.AmbientLight(0xffffff, 0.5));\n      const d1 = new THREE.DirectionalLight(0xffffff, 1.5);\n      d1.position.set(3, 5, 3);\n      scene.add(d1);\n      const d2 = new THREE.DirectionalLight(0x8899bb, 0.5);\n      d2.position.set(-3, 3, -3);\n      scene.add(d2);\n    }\n  );\n}\n\nfunction initEngine(area) {\n  renderer = new THREE.WebGLRenderer({\n    antialias: true,\n    alpha: true,\n    preserveDrawingBuffer: true\n  });\n  renderer.setSize(area.clientWidth, area.clientHeight);\n  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));\n  renderer.toneMapping = THREE.ACESFilmicToneMapping;\n  renderer.toneMappingExposure = 1.0;\n  area.appendChild(renderer.domElement);\n\n  camera = new THREE.PerspectiveCamera(\n    40,\n    area.clientWidth / area.clientHeight,\n    0.1,\n    100\n  );\n  camera.position.set(0, 1.0, 4.0);\n  camera.lookAt(0, 0.85, 0);\n\n  scene = new THREE.Scene();\n\n  wheelGroup = new THREE.Group();\n  scene.add(wheelGroup);\n\n  pmrem = new THREE.PMREMGenerator(renderer);\n  pmrem.compileEquirectangularShader();\n\n  loadEnvironment(vaseControls.get('envMap'));\n\n  buildVase();\n\n  window.renderer = renderer;\n  window.scene = scene;\n  window.camera = camera;\n\n  window.addEventListener('resize', () => {\n    camera.aspect = area.clientWidth / area.clientHeight;\n    camera.updateProjectionMatrix();\n    renderer.setSize(area.clientWidth, area.clientHeight);\n  });\n}\n\n// Texture System\n\nconst TEX = 2048;\nconst raycaster = new THREE.Raycaster();\nconst mouseNDC = new THREE.Vector2();\n\nconst paintCanvas = document.createElement('canvas');\npaintCanvas.width = TEX;\npaintCanvas.height = TEX;\nconst paintCtx = paint lePoints]);\n      setHandleDirty(true);\n      buildHandles();\n      drawHandleEditor();\n    }\n  });\n\n  heCanvas.addEventListener('pointerleave', (e) => {\n    e.stopPropagation();\n    if (isDrawingHandle) {\n      isDrawingHandle = false;\n      if (drawnHandlePoints.length > 2) {\n        setHandleProfile([...drawnHandlePoints]);\n        setHandleDirty(true);\n        buildHandles();\n      }\n    }\n  });\n\n  drawHandleEditor();\n}\n\n// =================================================================\n// ui.js\n// =================================================================\n\n// Initialize Engine\n\nconst area = document.getElementById('canvas-area') || document.querySelector('.tool-canvas-area');\ninitEngine(area);\n\n// UI Helper Functions\n\nfunction createSlider(label, key, min, max, step = 1) {\n  let curMin = min;\n  let curMax = max;\n\n  const group = document.createElement('div');\n  group.className = 'control-group';\n\n  const labelRow = document.createElement('div');\n  labelRow.className = 'slider-label-row';\n\n  const lbl = document.createElement('label');\n  lbl.className = 'control-label';\n  lbl.style.marginBottom = '0';\n  lbl.textContent = label;\n\n  const rangeRow = document.createElement('div');\n  rangeRow.className = 'slider-range';\n\n  const minInput = document.createElement('input');\n  minInput.type = 'number';\n  minInput.value = curMin;\n\n  const rangeSep = document.createElement('span');\n  rangeSep.textContent = '\\u2014';\n\n  const maxInput = document.createElement('input');\n  maxInput.type = 'number';\n  maxInput.value = curMax;\n\n  rangeRow.append(minInput, rangeSep, maxInput);\n  labelRow.append(lbl, rangeRow);\n\n  const wrap = document.createElement('div');\n  wrap.className = 'slider-wrap';\n\n  const fill = document.createElement('div');\n  fill.className = 'slider-fill';\n\n  const valueOverlay = document.createElement('div');\n  valueOverlay.className = 'slider-value-overlay';\n  valueOverlay.textContent = vaseControls.get(key);\n\n  const input = document.createElement('input');\n  input.type = 'range';\n  input.min = curMin;\n  input.max = curMax;\n  input.step = step;\n  input.value = vaseControls.get(key);\n\n  function updateFill(val) {\n    const pct = curMax > curMin ? ((val - curMin) / (curMax - curMin)) * 100 : 0;\n    const clampedPct = Math.max(0, Math.min(100, pct));\n    fill.style.width = clampedPct + '%';\n    valueOverlay.textContent = val;\n    valueOverlay.style.backgroundImage =\n      `linear-gradient(90deg, #fff 0%, #fff ${clampedPct}%, #000 ${clampedPct}%, #000 100%)`;\n  }\n\n  updateFill(vaseControls.get(key));\n\n  input.addEventListener('input', () => {\n    const val = parseFloat(input.value);\n    updateFill(val);\n    vaseControls.set(key, val);\n  });\n\n  vaseControls.onChange(key, (val) => {\n    input.value = val;\n    updateFill(val);\n  });\n\n  function applyRange() {\n    const newMin = parseFloat(minInput.value);\n    const newMax = parseFloat(maxInput.value);\n    if (isNaN(newMin) || isNaN(newMax) || newMax <= newMin) {\n      rangeRow.classList.add('slider-shake');\n      setTimeout(() => rangeRow.classList.remove('slider-shake'), 300);\n      minInput.value = curMin;\n      maxInput.value = curMax;\n      return;\n    }\n    curMin = newMin;\n    curMax = newMax;\n    input.min = curMin;\n    input.max = curMax;\n    let val = parseFloat(input.value);\n    if (val < curMin) { val = curMin; input.value = val; vaseControls.set(key, val); }\n    if (val > curMax) { val = curMax; input.value = val; vaseControls.set(key, val); }\n    updateFill(val);\n  }\n\n  minInput.addEventListener('change', applyRange);\n  maxInput.addEventListener('change', applyRange);\n\n  wrap.appendChild(fill);\n  wrap.appendChild(valueOverlay);\n  wrap.appendChild(input);\n  group.appendChild(labelRow);\n  group.appendChild(wrap);\n  return group;\n}\n\nfunction createColorPicker(label, key) {\n  const group = document.createElement('div');\n  group.className = 'control-group';\n\n  const lbl = document.createElement('label');\n  lbl.className = 'control-label';\n  lbl.textContent = label;\n\n  const input = document.createElement('input');\n  input.type = 'color';\n  input.value = vaseControls.get(key);\n\n  input.addEventListener('input', () => {\n    vaseControls.set(key, input.value);\n  });\n\n  vaseControls.onChange(key, (val) => {\n    input.value = val;\n  });\n\n  group.appendChild(lbl);\n  group.appendChild(input);\n  return group;\n}\n\nfunction createToggle(label, key) {\n  const group = document.createElement('div');\n  group.className = 'control-group';\n\n  const wrap = document.createElement('div');\n  wrap.className = 'toggle-wrap';\n\n  const lbl = document.createElement('span');\n  lbl.className = 'control-label';\n  lbl.style.marginBottom = '0';\n  lbl.textContent = label;\n\n  const toggle = document.createElement('div');\n  toggle.className = 'toggle' + (vaseControls.get(key) ? ' on' : '');\n\n  toggle.addEventListener('click', () => {\n    const newVal = !vaseControls.get(key);\n    vaseControls.set(key, newVal);\n    toggle.classList.toggle('on', newVal);\n  });\n\n  vaseControls.onChange(key, (val) => {\n    toggle.classList.toggle('on', val);\n  });\n\n  wrap.appendChild(lbl);\n  wrap.appendChild(toggle);\n  group.appendChild(wrap);\n  return group;\n}\n\nfunction createSelect(label, key, options) {\n  const group = document.createElement('div');\n  group.className = 'control-group';\n\n  const lbl = document.createElement('label');\n  lbl.className = 'control-label';\n  lbl.textContent = label;\n\n  const select = document.createElement('select');\n  for (const opt of options) {\n    const o = document.createElement('option');\n    o.value = typeof opt === 'string' ? opt : opt.value;\n    o.textContent = typeof opt === 'string' ? opt : opt.label;\n    if (o.value === String(vaseControls.get(key))) o.selected = true;\n    select.appendChild(o);\n  }\n\n  select.addEventListener('change', () => {\n    vaseControls.set(key, select.value);\n  });\n\n  vaseControls.onChange(key, (val) => {\n    select.value = val;\n  });\n\n  group.appendChild(lbl);\n  group.appendChild(select);\n  return group;\n}\n\nfunction createButton(label, actionName) {\n  const group = document.createElement('div');\n  group.className = 'control-group';\n\n  const btn = document.createElement('button');\n  btn.className = 'action-btn';\n  btn.textContent = label;\n  btn.addEventListener('click', () => vaseControls.fireAction(actionName));\n\n  group.appendChild(btn);\n  return group;\n}\n\nfunction createSeparator() {\n  const sep = document.createElement('div');\n  sep.className = 'control-separator';\n  return sep;\n}\n\nfunction createSectionTitle(text) {\n  const title = document.createElement('div');\n  title.className = 'section-title';\n  title.textContent = text;\n  return title;\n}\n\n// Build Toolbar\n\nconst toolbar = document.getElementById('toolbar') || document.getElementById('controls');\n\nconst header = document.createElement('div');\nheader.className = 'toolbar-header';\nheader.textContent = 'Vase Designer';\ntoolbar.appendChild(header);\n\nconst tabsDiv = document.createElement('div');\ntabsDiv.className = 'mode-tabs';\nconst MODES = ['Sculpt', 'Draw', 'Stick'];\nconst tabElements = {};\nconst panelElements = {};\n\nfor (const mode of MODES) {\n  const tab = document.createElement('button');\n  tab.className = 'mode-tab' + (mode === 'Sculpt' ? ' active' : '');\n  tab.textContent = mode;\n  tab.dataset.mode = mode;\n  tab.addEventListener('click', () => vaseControls.set('toolMode', mode));\n  tabsDiv.appendChild(tab);\n  tabElements[mode] = tab;\n}\ntoolbar.appendChild(tabsDiv);\n\nfor (const mode of MODES) {\n  const panel = document.createElement('div');\n  panel.className = 'mode-panel' + (mode === 'Sculpt' ? ' active' : '');\n  panelElements[mode] = panel;\n  toolbar.appendChild(panel);\n}\n\n// ---- Sculpt Panel ----\nconst sculptPanel = panelElements['Sculpt'];\n\nsculptPanel.appendChild(createSectionTitle('Shape'));\nsculptPanel.appendChild(createSelect('Vase Preset', 'vasePreset', [\n  'classic', 'tall', 'bowl', 'urn', 'bottle', 'wide'\n]));\nsculptPanel.appendChild(createSlider('Profile Smoothing', 'profileSmoothing', 0, 100));\nsculptPanel.appendChild(createSlider('Lathe Segments', 'latheSegments', 16, 128));\ninitProfileEditor(sculptPanel);\nsculptPanel.appendChild(createButton('Reset Profile', 'clearProfile'));\n\nsculptPanel.appendChild(createSeparator());\nsculptPanel.appendChild(createSectionTitle('Handles'));\nsculptPanel.appendChild(createToggle('Show Handles', 'showHandles'));\nconst handleThicknessControl = createSlider('Handle Thickness', 'handleThickness', 1, 50);\nsculptPanel.appendChild(handleThicknessControl);\ninitHandleEditor(sculptPanel);\nsculptPanel.appendChild(createButton('Reset Handles', 'clearHandles'));\n\nsculptPanel.appendChild(createSeparator());\nsculptPanel.appendChild(createSectionTitle('Material'));\nsculptPanel.appendChild(createColorPicker('Base Color', 'baseColor'));\nsculptPanel.appendChild(createSlider('Roughness', 'roughness', 0, 100));\nsculptPanel.appendChild(createSlider('Metalness', 'metalness', 0, 100));\n\nsculptPanel.appendChild(createSeparator());\nsculptPanel.appendChild(createSlider('Wheel Speed', 'wheelSpeed', 0, 100));\n\n// ---- Draw Panel ----\nconst drawPanel = panelElements['Draw'];\n\ndrawPanel.appendChild(createSlider('Brush Size', 'brushSize', 1, 50));\ndrawPanel.appendChild(createColorPicker('Brush Color', 'brushColor'));\ndrawPanel.appendChild(createSlider('Brush Opacity', 'brushOpacity', 1, 100));\ndrawPanel.appendChild(createToggle('Eraser Mode', 'eraser'));\ndrawPanel.appendChild(createSeparator());\ndrawPanel.appendChild(createButton('Clear Paint', 'clearTexture'));\n\n// ---- Stick Panel ----\nconst stickPanel = panelElements['Stick'];\n\nstickPanel.appendChild(createSectionTitle('Stickers'));\n\n// Clay multi-image gallery\nconst grid = document.createElement('div');\ngrid.className = 'ct-multi-grid';\nconst counter = document.createElement('div');\ncounter.className = 'ct-multi-counter';\n\nfunction rebuildStickerGallery() {\n  grid.innerHTML = '';\n  stickerImages.forEach((img, i) => {\n    const thumb = document.createElement('div');\n    thumb.className = 'ct-multi-thumb' + (i === selectedStickerIndex ? ' selected' : '');\n    const thumbImg = document.createElement('img');\n    thumbImg.src = img.src;\n    const rm = document.createElement('button');\n    rm.className = 'ct-multi-remove';\n    rm.textContent = '\\u00d7';\n    rm.addEventListener('click', (e) => {\n      e.stopPropagation();\n      stickerImages.splice(i, 1);\n      if (selectedStickerIndex >= stickerImages.length) {\n        setSelectedStickerIndex(Math.max(0, stickerImages.length - 1));\n      }\n      rebuildStickerGallery();\n    });\n    thumb.addEventListener('click', () => {\n      setSelectedStickerIndex(i);\n      grid.querySelectorAll('.ct-multi-thumb').forEach(t => t.classList.remove('selected'));\n      thumb.classList.add('selected');\n    });\n    thumb.append(thumbImg, rm);\n    grid.appendChild(thumb);\n  });\n\n  const addBtn = document.createElement('div');\n  addBtn.className = 'ct-multi-add';\n  addBtn.textContent = '+';\n  const fi = document.createElement('input');\n  fi.type = 'file';\n  fi.accept = 'image/*';\n  fi.multiple = true;\n  fi.addEventListener('change', () => {\n    const files = Array.from(fi.files);\n    let loaded = 0;\n    files.forEach((file) => {\n      const reader = new FileReader();\n      reader.onload = (e) => {\n        const img = new Image();\n        img.onload = () => {\n          stickerImages.push(img);\n          loaded++;\n          if (loaded === files.length) {\n            if (stickerImages.length === loaded) setSelectedStickerIndex(0);\n            rebuildStickerGallery();\n          }\n        };\n        img.src = e.target.result;\n      };\n      reader.readAsDataURL(file) erer.render(scene, camera);\n}\n\nanimate();",

  "custom_css": ":root {\n  --bg-primary: #ffffff;\n  --bg-secondary: #fafafa;\n  --bg-tertiary: #f5f5f5;\n  --bg-input: #ffffff;\n  --border: #e5e5e5;\n  --border-focus: #d4d4d4;\n  --text: #0a0a0a;\n  --text-label: #525252;\n  --text-muted: #a3a3a3;\n  --accent-sculpt: #5b8def;\n  --accent-draw: #d4726e;\n  --accent-stick: #c77a9e;\n  --toolbar-w: 280px;\n  --radius-sm: 6px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-full: 9999px;\n  --clay-font: \"Neue Haas Grotesk Display Pro\", system-ui, -apple-system, sans-serif;\n  --clay-shadow-sm: 0 1px 2px rgba(0,0,0,0.05);\n  --clay-shadow-md: 0 2px 8px rgba(0,0,0,0.08);\n  --clay-ease: cubic-bezier(0.4, 0, 0.2, 1);\n}\n\n*, *::before, *::after {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nbody {\n  overflow: hidden;\n  width: 100vw;\n  height: 100vh;\n  background: transparent;\n  font-family: var(--clay-font);\n  font-size: 14px;\n  color: var(--text);\n  display: flex;\n}\n\n.canvas-area {\n  flex: 1;\n  position: relative;\n  overflow: hidden;\n}\n\n.canvas-area canvas {\n  display: block;\n}\n\n.toolbar {\n  width: var(--toolbar-w);\n  min-width: var(--toolbar-w);\n  height: 100vh;\n  background: var(--bg-primary);\n  border-left: 1px solid var(--border);\n  overflow-y: auto;\n  overflow-x: hidden;\n  display: flex;\n  flex-direction: column;\n}\n\n.toolbar-header {\n  padding: 16px 16px 12px;\n  font-size: 16px;\n  font-weight: 700;\n  color: var(--text);\n  border-bottom: 1px solid var(--border);\n}\n\n.mode-tabs {\n  display: flex;\n  padding: 8px;\n  gap: 5px;\n}\n\n.mode-tab {\n  flex: 1;\n  padding: 8px 4px;\n  border: 1px solid var(--border);\n  border-radius: var(--radius-full);\n  background: var(--bg-primary);\n  color: var(--text-label);\n  font-size: 13px;\n  font-weight: 500;\n  cursor: pointer;\n  text-align: center;\n  transition: all 0.2s var(--clay-ease);\n}\n\n.mode-tab:hover {\n  background: var(--bg-tertiary);\n  color: var(--text);\n}\n\n.mode-tab.active {\n  color: content: center;\n  font-size: 13px;\n  font-weight: 500;\n  white-space: nowrap;\n  pointer-events: none;\n  z-index: 2;\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n.slider-wrap input[type=\"range\"] {\n  position: absolute;\n  top: 0;\n  left: 0;\n  width: 100%;\n  height: 100%;\n  -webkit-appearance: none;\n  appearance: none;\n  background: transparent;\n  outline: none;\n  cursor: pointer;\n  margin: 0;\n  z-index: 2;\n}\n\n.slider-wrap input[type=\"range\"]::-webkit-slider-thumb {\n  -webkit-appearance: none;\n  appearance: none;\n  width: 0;\n  height: 0;\n}\n\n.slider-wrap input[type=\"range\"]::-moz-range-thumb {\n  width: 0;\n  height: 0;\n  border: none;\n}\n\n.slider-value {\n  font-size: 11px;\n  color: var(--text-muted);\n  min-width: 28px;\n  text-align: right;\n}\n\ninput[type=\"color\"] {\n  -webkit-appearance: none;\n  appearance: none;\n  width: 100%;\n  height: 32px;\n  border: 1px solid #efefef;\n  border-radius: var(--radius-sm);\n  background: none;\n  cursor: pointer;\n  padding: 2px;\n}\n\ninput[type=\"color\"]::-webkit-color-swatch-wrapper {\n  padding: 0;\n}\n\ninput[type=\"color\"]::-webkit-color-swatch {\n  border: none;\n  border-radius: 4px;\n}\n\nselect {\n  width: 100%;\n  padding: 8px 28px 8px 10px;\n  background: var(--bg-primary);\n  border: 1px solid #efefef;\n  border-radius: var(--radius-sm);\n  color: var(--text);\n  font-size: 13px;\n  font-weight: 500;\n  font-family: var(--clay-font);\n  outline: none;\n  cursor: pointer;\n  transition: border-color 0.2s var(--clay-ease);\n}\n\nselect:focus {\n  border-color: var(--border-focus);\n}\n\n.toggle-wrap {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n\n.toggle {\n  position: relative;\n  width: 32px;\n  height: 16px;\n  background: #efefef;\n  border-radius: 8px;\n  cursor: pointer;\n  transition: background 0.2s var(--clay-ease);\n  border: none;\n  flex-shrink: 0;\n}\n\n.toggle.on {\n  background: #000;\n}\n\n.toggle::after {\n  content: '';\n  position: absolute;\n  top: 2px;\n  left: 2px;\n  width: 12px;\n  height: 12px;\n  background: #fff;\n  border-radius: 50%;\n  transition: transform 0.2s var(--clay-ease);\n  box-shadow: 0 1px 2px rgba(0,0,0,0.2);\n}\n\n.toggle.on::after {\n  transform: translateX(16px);\n}\n\n.action-btn {\n  width: 100%;\n  padding: 10px 12px;\n  background: #ebebeb;\n  border: none;\n  border-radius: var(--radius-full);\n  color: var(--text);\n  font-size: 13px;\n  font-weight: 500;\n  font-family: var(--clay-font);\n  cursor: pointer;\n  transition: all 0.2s var(--clay-ease);\n}\n\n.action-btn:hover {\n  background: #e0e0e0;\n}\n\n.action-btn:active {\n  background: #000;\n  color: #fff;\n}\n\n.section-title {\n  font-size: 12px;\n  font-weight: 700;\n  color: var(--text);\n  margin-bottom: 8px;\n  padding-bottom: 4px;\n}\n\n.editor-wrap {\n  background: var(--bg-tertiary);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-md);\n  padding: 8px;\n  margin: 4px 0 8px;\n}\n\n.editor-label {\n  color: var(--text-label);\n  font-size: 10px;\n  margin-bottom: 4px;\n  text-align: center;\n  font-weight: 500;\n  opacity: 0.6;\n}\n\n.editor-canvas {\n  width: 100%;\n  border-radius: 4px;\n  cursor: crosshair;\n  background: #f5f5f5;\n  display: block;\n  touch-action: none;\n  user-select: none;\n  -webkit-user-select: none;\n}\n\n.editor-canvas:hover {\n  box-shadow: 0 0 12px rgba(0, 0, 0, 0.08);\n}\n\n/* ct-multi-image gallery */\n.ct-multi-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 4px;\n}\n\n.ct-multi-thumb {\n  aspect-ratio: 1;\n  border-radius: 8px;\n  overflow: hidden;\n  border: 1px solid #e8e8e8;\n  position: relative;\n  cursor: pointer;\n}\n\n.ct-multi-thumb img {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n}\n\n.ct-multi-thumb.selected {\n  border-color: var(--accent-stick);\n  border-width: 2px;\n}\n\n.ct-multi-thumb .ct-multi-remove {\n  position: absolute;\n  top: 2px;\n  right: 2px;\n  width: 16px;\n  height: 16px;\n  background: rgba(0,0,0,0.5);\n  color: #fff;\n  border: none;\n  border-radius: 50%;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  opacity: 0;\n  transition: opacity 0.15s;\n  font-size: 10px;\n}\n\n.ct-multi-thumb:hover .ct-multi-remove {\n  opacity: 1;\n}\n\n.ct-multi-add {\n  aspect-ratio: 1;\n  border: 2px dashed #d4d4d4;\n  border-radius: 8px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: #999;\n  cursor: pointer;\n  position: relative;\n  font-size: 18px;\n  transition: border-color 0.2s;\n}\n\n.ct-multi-add:hover {\n  border-color: #999;\n}\n\n.ct-multi-add input[type=\"file\"] {\n  position: absolute;\n  inset: 0;\n  opacity: 0;\n  cursor: pointer;\n}\n\n.ct-multi-counter {\n  color: #999;\n  text-align: right;\n  margin-top: 4px;\n  font-size: 11px;\n}\n\n.toolbar::-webkit-scrollbar {\n  width: 6px;\n}\n\n.toolbar::-webkit-scrollbar-track {\n  background: transparent;\n}\n\n.toolbar::-webkit-scrollbar-thumb {\n  background: #d4d4d4;\n  border-radius: 3px;\n}\n\n.toolbar::-webkit-scrollbar-thumb:hover {\n  background: #a3a3a3;\n}"
}
  </script>

<body>
  <div class="canvas-area" id="canvas-area"></div>
  <div class="toolbar" id="toolbar"></div>
  <script type="module">
import * as THREE from 'https://esm.sh/three@0.170.0';
import { RGBELoader } from 'https://esm.sh/three@0.170.0/addons/loaders/RGBELoader.js';

// =================================================================
// controls.js
// =================================================================

const values = {
  toolMode: 'Sculpt',
  vasePreset: 'classic',
  profileSmoothing: 34,
  latheSegments: 64,
  showHandles: true,
  handleThickness: 10,
  baseColor: '#55bf40',
  roughness: 40,
  metalness: 0,
  envMap: 'Sunset',
  wheelSpeed: 25,
  brushSize: 1,
  brushColor: '#f26363',
  brushOpacity: 100,
  eraser: false,
  stickerScale: 61,
  stickerRotation: 0,
  stickerRandomize: true
};

const listeners = {};
const actions = {};

const vaseControls = {
  get(key) { return values[key]; },
  set(key, value) {
    values[key] = value;
    if (listeners[key]) {
      listeners[key].forEach(fn => fn(value));
    }
  },
  getAll() { return { ...values }; },
  onChange(key, fn) {
    if (!listeners[key]) listeners[key] = [];
    listeners[key].push(fn);
  },
  onAction(name, fn) {
    if (!actions[name]) actions[name] = [];
    actions[name].push(fn);
  },
  fireAction(name) {
    if (actions[name]) {
      actions[name].forEach(fn => fn());
    }
  }
};

// =================================================================
// engine.js
// =================================================================

let renderer, camera, scene, wheelGroup;

let pmrem;

const HDR_URLS = {
  Studio: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr',
  Sunset: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/kloofendal_48d_partly_cloudy_puresky_1k.hdr',
  Courtyard: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/courtyard_1k.hdr',
  Night: 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/moonlit_golf_1k.hdr'
};

function loadEnvironment(name) {
  const url = HDR_URLS[name];
  if (!url) return;

  new RGBELoader().load(
    url,
    (texture) => {
      const envMap = pmrem.fromEquirectangular(texture).texture;
      scene.environment = envMap;
      scene.background = envMap;
      texture.dispose();
    },
    undefined,
    () => {
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      const d1 = new THREE.DirectionalLight(0xffffff, 1.5);
      d1.position.set(3, 5, 3);
      scene.add(d1);
      const d2 = new THREE.DirectionalLight(0x8899bb, 0.5);
      d2.position.set(-3, 3, -3);
      scene.add(d2);
    }
  );
}

function initEngine(area) {
  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true,
    preserveDrawingBuffer: true
  });
  renderer.setSize(area.clientWidth, area.clientHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  area.appendChild(renderer.domElement);

  camera = new THREE.PerspectiveCamera(
    40,
    area.clientWidth / area.clientHeight,
    0.1,
    100
  );
  camera.position.set(0, 1.0, 4.0);
  camera.lookAt(0, 0.85, 0);

  scene = new THREE.Scene();

  wheelGroup = new THREE.Group();
  scene.add(wheelGroup);

  pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();

  loadEnvironment(vaseControls.get('envMap'));

  buildVase();

  window.renderer = renderer;
  window.scene = scene;
  window.camera = camera;

  window.addEventListener('resize', () => {
    camera.aspect = area.clientWidth / area.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(area.clientWidth, area.clientHeight);
  });
}

// Texture System

const TEX = 2048;
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2();

const paintCanvas = document.createElement('canvas');
paintCanvas.width = TEX;
paintCanvas.height = TEX;
const paintCtx = paintCanvas.getContext('2d');

const stickerCanvas = document.createElement('canvas');
stickerCanvas.width = TEX;
stickerCanvas.height = TEX;
const stickerCtx = stickerCanvas.getContext('2d');

const compositeCanvas = document.createElement('canvas');
compositeCanvas.width = TEX;
compositeCanvas.height = TEX;
const compositeCtx = compositeCanvas.getContext('2d');

function fillBaseColor(color) {
  paintCtx.fillStyle = color;
  paintCtx.fillRect(0, 0, TEX, TEX);
}

fillBaseColor(vaseControls.get('baseColor'));
compositeCtx.drawImage(paintCanvas, 0, 0);

const canvasTexture = new THREE.CanvasTexture(compositeCanvas);
canvasTexture.colorSpace = THREE.SRGBColorSpace;

function compositeTexture() {
  compositeCtx.clearRect(0, 0, TEX, TEX);
  compositeCtx.drawImage(paintCanvas, 0, 0);
  compositeCtx.drawImage(stickerCanvas, 0, 0);
  canvasTexture.needsUpdate = true;
}

// Material

const vaseMaterial = new THREE.MeshStandardMaterial({
  map: canvasTexture,
  roughness: vaseControls.get('roughness') / 100,
  metalness: vaseControls.get('metalness') / 100,
  side: THREE.DoubleSide
});

// Vase Sculpt System

const PRESETS = {
  classic: [
    [0, 0], [0.6, 0], [0.65, 0.05], [0.7, 0.15], [0.75, 0.3],
    [0.8, 0.5], [0.85, 0.7], [0.82, 0.9], [0.7, 1.1], [0.55, 1.3],
    [0.45, 1.5], [0.42, 1.65], [0.45, 1.8], [0.5, 1.9], [0.48, 2],
    [0.35, 2.05], [0, 2.05]
  ],
  tall: [
    [0, 0], [0.4, 0], [0.42, 0.04], [0.45, 0.14], [0.43, 0.35],
    [0.38, 0.56], [0.32, 0.84], [0.28, 1.12], [0.26, 1.4], [0.28, 1.6],
    [0.35, 1.74], [0.38, 1.82], [0.35, 1.9], [0.25, 1.96], [0, 1.96]
  ],
  bowl: [
    [0, 0], [0.3, 0], [0.35, 0.05], [0.6, 0.1], [0.8, 0.2],
    [0.95, 0.35], [1.05, 0.55], [1.08, 0.7], [1.05, 0.85], [1, 0.9],
    [0, 0.9]
  ],
  urn: [
    [0, 0], [0.5, 0], [0.55, 0.05], [0.65, 0.2], [0.8, 0.5],
    [0.9, 0.8], [0.92, 1], [0.85, 1.2], [0.7, 1.4], [0.5, 1.55],
    [0.35, 1.6], [0.3, 1.65], [0.28, 1.7], [0.3, 1.75], [0.35, 1.8],
    [0.3, 1.85], [0, 1.85]
  ],
  bottle: [
    [0, 0], [0.5, 0], [0.55, 0.05], [0.6, 0.13], [0.65, 0.35],
    [0.68, 0.6], [0.65, 0.85], [0.55, 1.05], [0.35, 1.18], [0.2, 1.3],
    [0.18, 1.48], [0.17, 1.7], [0.18, 1.85], [0.2, 1.95], [0.18, 2.0],
    [0.15, 2.05], [0, 2.05]
  ],
  wide: [
    [0, 0], [0.6, 0], [0.65, 0.05], [0.85, 0.15], [1, 0.3],
    [1.1, 0.5], [1.12, 0.7], [1.05, 0.9], [0.9, 1.05], [0.75, 1.15],
    [0.65, 1.2], [0.6, 1.25], [0.55, 1.3], [0, 1.3]
  ]
};

const MAX_H = 2.1;
const MAX_R = 1.2;
const DRAW_MAX_H = MAX_H * 0.85;

let currentProfile = [...PRESETS.classic];
let profileDirty = true;

function getCurrentProfile() { return currentProfile; }
function setCurrentProfile(p) { currentProfile = p; }
function isProfileDirty() { return profileDirty; }
function setProfileDirty(v) { profileDirty = v; }

function smooth(points, iterations) {
  let pts = points.map(p => [...p]);
  for (let i = 0; i < iterations; i++) {
    const result = [pts[0]];
    for (let j = 0; j < pts.length - 1; j++) {
      result.push([
        0.75 * pts[j][0] + 0.25 * pts[j + 1][0],
        0.75 * pts[j][1] + 0.25 * pts[j + 1][1]
      ]);
      result.push([
        0.25 * pts[j][0] + 0.75 * pts[j + 1][0],
        0.25 * pts[j][1] + 0.75 * pts[j + 1][1]
      ]);
    }
    result.push(pts[pts.length - 1]);
    pts = result;
  }
  return pts;
}

let vaseMesh = null;

function getVaseMesh() { return vaseMesh; }

function buildVase() {
  const smoothIterations = Math.round(vaseControls.get('profileSmoothing') / 25);
  const segments = vaseControls.get('latheSegments');
  const smoothed = smooth(currentProfile, smoothIterations);
  const lathePoints = smoothed.map(p => new THREE.Vector2(p[0], p[1]));
  const geometry = new THREE.LatheGeometry(lathePoints, segments);

  if (vaseMesh) {
    vaseMesh.geometry.dispose();
    vaseMesh.geometry = geometry;
  } else {
    vaseMesh = new THREE.Mesh(geometry, vaseMaterial);
    wheelGroup.add(vaseMesh);
  }

  profileDirty = false;
  buildHandles();
}

// Handle System

let handleMeshes = [];
let handleProfile = [[0, 0.8], [0.3, 0.9], [0.4, 1.1], [0.3, 1.3], [0, 1.4]];
let handleDirty = true;

function getHandleMeshes() { return handleMeshes; }
function getHandleProfile() { return handleProfile; }
function setHandleProfile(p) { handleProfile = p; }
function isHandleDirty() { return handleDirty; }
function setHandleDirty(v) { handleDirty = v; }

function buildHandles() {
  for (const mesh of handleMeshes) {
    wheelGroup.remove(mesh);
    mesh.geometry.dispose();
    mesh.material.dispose();
  }
  handleMeshes = [];

  if (!vaseControls.get('showHandles') || handleProfile.length < 2) return;

  const thickness = vaseControls.get('handleThickness') / 200;
  const points3D = handleProfile.map(p => new THREE.Vector3(p[0], p[1], 0));
  const curve = new THREE.CatmullRomCurve3(points3D, false, 'catmullrom', 0.5);
  const geometry = new THREE.TubeGeometry(curve, 32, thickness, 12, false);

  for (let i = 0; i < 2; i++) {
    const handleMat = new THREE.MeshStandardMaterial({
      color: vaseControls.get('baseColor'),
      roughness: vaseControls.get('roughness') / 100,
      metalness: vaseControls.get('metalness') / 100,
      side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geometry, handleMat);
    mesh.rotation.y = Math.PI * i;
    wheelGroup.add(mesh);
    handleMeshes.push(mesh);
  }

  handleDirty = false;
}

// Paint/Draw System

function getUV(event) {
  if (!vaseMesh) return null;
  const rect = renderer.domElement.getBoundingClientRect();
  mouseNDC.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouseNDC.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObject(vaseMesh, false);
  return (hits.length > 0 && hits[0].uv) ? hits[0].uv.clone() : null;
}

function paint(uv, size, color, opacity, isEraser) {
  if (!uv) return;
  const px = uv.x * TEX;
  const py = (1 - uv.y) * TEX;
  const radius = size * (TEX / 200);
  const fillColor = isEraser ? vaseControls.get('baseColor') : color;

  paintCtx.save();
  paintCtx.globalAlpha = opacity / 100;

  const gradient = paintCtx.createRadialGradient(px, py, 0, px, py, radius);
  gradient.addColorStop(0, fillColor);
  gradient.addColorStop(0.7, fillColor);
  gradient.addColorStop(1, fillColor + '00');
  paintCtx.fillStyle = gradient;

  paintCtx.beginPath();
  paintCtx.arc(px, py, radius, 0, Math.PI * 2);
  paintCtx.fill();

  if (px < radius) {
    paintCtx.beginPath();
    paintCtx.arc(px + TEX, py, radius, 0, Math.PI * 2);
    paintCtx.fill();
  } else if (px > TEX - radius) {
    paintCtx.beginPath();
    paintCtx.arc(px - TEX, py, radius, 0, Math.PI * 2);
    paintCtx.fill();
  }

  paintCtx.restore();
  compositeTexture();
}

function interpolatedPaint(uv1, uv2, size, color, opacity, isEraser) {
  let dx = uv2.x - uv1.x;
  const dy = uv2.y - uv1.y;

  if (Math.abs(dx) > 0.5) {
    dx = dx > 0 ? dx - 1 : dx + 1;
  }

  const distance = Math.sqrt(dx * dx + dy * dy);
  const stepSize = size / TEX * 0.3;
  const steps = Math.max(1, Math.ceil(distance / stepSize));

  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    let u = uv1.x + dx * t;
    if (u < 0) u += 1;
    if (u > 1) u -= 1;
    paint({ x: u, y: uv1.y + dy * t }, size, color, opacity * 0.5, isEraser);
  }
}

// Sticker/Decal System

const stickerImages = [];

let selectedStickerIndex = 0;

function getSelectedStickerIndex() { return selectedStickerIndex; }
function setSelectedStickerIndex(i) { selectedStickerIndex = i; }

function placeSticker(uv) {
  if (stickerImages.length === 0) return;

  const randomize = vaseControls.get('stickerRandomize');
  const idx = randomize
    ? Math.floor(Math.random() * stickerImages.length)
    : selectedStickerIndex % stickerImages.length;
  const img = stickerImages[idx];
  if (!img.complete) return;

  let scale = vaseControls.get('stickerScale') / 100;
  let rotation = vaseControls.get('stickerRotation') * Math.PI / 180;

  if (randomize) {
    scale *= 0.5 + Math.random() * 1.0;
    rotation = Math.random() * Math.PI * 2;
  }

  const stickerSize = TEX * 0.1 * scale;
  const px = uv.x * TEX;
  const py = (1 - uv.y) * TEX;

  stickerCtx.save();
  stickerCtx.translate(px, py);
  stickerCtx.rotate(rotation);
  stickerCtx.drawImage(img, -stickerSize / 2, -stickerSize / 2, stickerSize, stickerSize);

  if (px < stickerSize) {
    stickerCtx.drawImage(img,
      -stickerSize / 2 + TEX, -stickerSize / 2,
      stickerSize, stickerSize
    );
  } else if (px > TEX - stickerSize) {
    stickerCtx.drawImage(img,
      -stickerSize / 2 - TEX, -stickerSize / 2,
      stickerSize, stickerSize
    );
  }

  stickerCtx.restore();
  compositeTexture();
}

// Profile Editor

let peCanvas, peCtx;
let isDrawingProfile = false;
let drawnProfilePoints = [];

function profileToCanvas(point, canvasW, canvasH) {
  const margin = 20;
  const usableW = canvasW - margin * 2;
  const usableH = canvasH - margin * 2;
  return [
    margin + (point[0] / MAX_R) * usableW,
    canvasH - margin - (point[1] / MAX_H) * usableH
  ];
}

function canvasToProfile(x, y, canvasW, canvasH) {
  const margin = 20;
  const usableW = canvasW - margin * 2;
  const usableH = canvasH - margin * 2;
  return [
    Math.max(0, Math.min(MAX_R, (x - margin) / usableW * MAX_R)),
    Math.max(0, Math.min(DRAW_MAX_H, (canvasH - margin - y) / usableH * MAX_H))
  ];
}

function processDrawnPoints(pts) {
  const cp = getCurrentProfile();
  if (pts.length < 2) return cp;

  const sorted = [...pts]
    .sort((a, b) => a[1] - b[1])
    .map(p => [
      Math.max(0, Math.min(p[0], MAX_R)),
      Math.max(0, Math.min(p[1], MAX_H))
    ]);

  const step = Math.max(1, Math.floor(sorted.length / 16));
  const sampled = [];
  for (let i = 0; i < sorted.length; i += step) {
    sampled.push(sorted[i]);
  }
  if (sampled[sampled.length - 1] !== sorted[sorted.length - 1]) {
    sampled.push(sorted[sorted.length - 1]);
  }

  const base = [sampled[0][0], 0];
  const baseAxis = [0, 0];
  const top = sampled[sampled.length - 1];
  const topAxis = [0, top[1]];

  return [baseAxis, base, ...sampled, topAxis];
}

function drawProfileEditor() {
  if (!peCanvas) return;
  const w = peCanvas.width;
  const h = peCanvas.height;
  const ctx = peCtx;
  const cp = getCurrentProfile();

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0, 0, w, h);

  const margin = 20;
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 10; i++) {
    const x = margin + (i / 10) * (w - margin * 2);
    const y = margin + (i / 10) * (h - margin * 2);
    ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, h - margin); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(w - margin, y); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(margin, margin);
  ctx.lineTo(margin, h - margin);
  ctx.stroke();
  ctx.setLineDash([]);

  const safeHY = profileToCanvas([0, DRAW_MAX_H], w, h)[1];
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(margin, safeHY);
  ctx.lineTo(w - margin, safeHY);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = '8px sans-serif';
  ctx.fillText('max height', w - margin - 50, safeHY - 3);

  const maxHY = profileToCanvas([0, MAX_H], w, h)[1];
  ctx.fillStyle = 'rgba(255, 50, 50, 0.08)';
  ctx.fillRect(margin, maxHY, w - margin * 2, safeHY - maxHY);

  if (cp.length > 1) {
    const smoothIter = Math.round(vaseControls.get('profileSmoothing') / 25);
    const smoothed = smooth(cp, smoothIter);

    ctx.beginPath();
    let first = profileToCanvas(smoothed[0], w, h);
    ctx.moveTo(first[0], first[1]);
    for (let i = 1; i < smoothed.length; i++) {
      const p = profileToCanvas(smoothed[i], w, h);
      ctx.lineTo(p[0], p[1]);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(first[0], first[1]);
    for (let i = 1; i < smoothed.length; i++) {
      const p = profileToCanvas(smoothed[i], w, h);
      ctx.lineTo(p[0], p[1]);
    }
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.stroke();

    for (const p of cp) {
      const [cx, cy] = profileToCanvas(p, w, h);
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
    }
  }

  ctx.fillStyle = '#a3a3a3';
  ctx.font = '9px sans-serif';
  ctx.fillText('\u2190 axis', margin + 2, h - 5);
  ctx.fillText('radius \u2192', w - 60, h - 5);
}

function initProfileEditor(container) {
  const wrap = document.createElement('div');
  wrap.className = 'editor-wrap';
  wrap.id = 'pe-wrap';

  const label = document.createElement('div');
  label.className = 'editor-label';
  label.textContent = 'Draw vase profile (right side)';

  peCanvas = document.createElement('canvas');
  peCanvas.width = 220;
  peCanvas.height = 320;
  peCanvas.className = 'editor-canvas';
  peCtx = peCanvas.getContext('2d');

  wrap.appendChild(label);
  wrap.appendChild(peCanvas);
  container.appendChild(wrap);

  peCanvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (vaseControls.get('toolMode') !== 'Sculpt') return;
    peCanvas.setPointerCapture(e.pointerId);
    isDrawingProfile = true;
    drawnProfilePoints = [];
    const rect = peCanvas.getBoundingClientRect();
    const sx = peCanvas.width / rect.width;
    const sy = peCanvas.height / rect.height;
    drawnProfilePoints.push(canvasToProfile(
      (e.clientX - rect.left) * sx,
      (e.clientY - rect.top) * sy,
      peCanvas.width, peCanvas.height
    ));
  });

  peCanvas.addEventListener('pointermove', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (!isDrawingProfile) return;
    const rect = peCanvas.getBoundingClientRect();
    const sx = peCanvas.width / rect.width;
    const sy = peCanvas.height / rect.height;
    drawnProfilePoints.push(canvasToProfile(
      (e.clientX - rect.left) * sx,
      (e.clientY - rect.top) * sy,
      peCanvas.width, peCanvas.height
    ));
    setCurrentProfile(processDrawnPoints(drawnProfilePoints));
    setProfileDirty(true);
    drawProfileEditor();
  });

  peCanvas.addEventListener('pointerup', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (!isDrawingProfile) return;
    isDrawingProfile = false;
    if (drawnProfilePoints.length > 2) {
      setCurrentProfile(processDrawnPoints(drawnProfilePoints));
      setProfileDirty(true);
      buildVase();
      drawProfileEditor();
    }
  });

  peCanvas.addEventListener('pointerleave', (e) => {
    e.stopPropagation();
    if (isDrawingProfile) {
      isDrawingProfile = false;
      if (drawnProfilePoints.length > 2) {
        setCurrentProfile(processDrawnPoints(drawnProfilePoints));
        setProfileDirty(true);
        buildVase();
      }
    }
  });

  drawProfileEditor();
}

// Handle Editor

let heCanvas, heCtx;
let isDrawingHandle = false;
let drawnHandlePoints = [];
let heWrapEl;

function getHandleEditorWrap() { return heWrapEl; }

function handleToCanvas(point, canvasW, canvasH) {
  const margin = 15;
  const usableW = canvasW - margin * 2;
  const usableH = canvasH - margin * 2;
  return [
    margin + (point[0] / MAX_R) * usableW,
    canvasH - margin - (point[1] / MAX_H) * usableH
  ];
}

function canvasToHandle(x, y, canvasW, canvasH) {
  const margin = 15;
  const usableW = canvasW - margin * 2;
  const usableH = canvasH - margin * 2;
  return [
    Math.max(0, Math.min(MAX_R, (x - margin) / usableW * MAX_R)),
    Math.max(0, Math.min(MAX_H, (canvasH - margin - y) / usableH * MAX_H))
  ];
}

function drawHandleEditor() {
  if (!heCanvas) return;
  const w = heCanvas.width;
  const h = heCanvas.height;

  for (let i = 0; i <= 10; i++) {

    const y = margin + (i / 10) * (h - margin * 2);
    ctx.beginPath(); ctx.moveTo(x, margin); ctx.lineTo(x, h - margin); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(w - margin, y); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(margin, margin);
  ctx.lineTo(margin, h - margin);
  ctx.stroke();
  ctx.setLineDash([]);

  if (hp.length > 1) {
    ctx.beginPath();
    const first = handleToCanvas(hp[0], w, h);

    for (let i = 1; i < hp.length; i++) {
      const p = handleToCanvas(hp[i], w, h);

    }
    ctx.strokeStyle = '#000';

    for (const p of hp) {

      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
    }
  }

  ctx.fillStyle = '#a3a3a3';
  ctx.font = '9px sans-serif';
  ctx.fillText('\u2190 center', margin + 2, h - 5);
  ctx.fillText('width \u2192', w - 60, h - 5);
}

// UI Helper Functions

function createSlider(label, key, min, max, step = 1) {
  let curMin = min;
  let curMax = max;

  const group = document.createElement('div');
  group.className = 'control-group';

  const labelRow = document.createElement('div');
  labelRow.className = 'slider-label-row';

  const lbl = document.createElement('label');
  lbl.className = 'control-label';
  lbl.style.marginBottom = '0';
  lbl.textContent = label;

  const rangeRow = document.createElement('div');
  rangeRow.className = 'slider-range';

  const minInput = document.createElement('input');
  minInput.type = 'number';
  minInput.value = curMin;

  const rangeSep = document.createElement('span');
  rangeSep.textContent = '\u2014';

  const maxInput = document.createElement('input');
  maxInput.type = 'number';
  maxInput.value = curMax;

  rangeRow.append(minInput, rangeSep, maxInput);
  labelRow.append(lbl, rangeRow);

  const wrap = document.createElement('div');
  wrap.className = 'slider-wrap';

  const fill = document.createElement('div');
  fill.className = 'slider-fill';

  const valueOverlay = document.createElement('div');
  valueOverlay.className = 'slider-value-overlay';
  valueOverlay.textContent = vaseControls.get(key);

  const input = document.createElement('input');
  input.type = 'range';
  input.min = curMin;
  input.max = curMax;
  input.step = step;
  input.value = vaseControls.get(key);

  function updateFill(val) {
    const pct = curMax > curMin ? ((val - curMin) / (curMax - curMin)) * 100 : 0;
    const clampedPct = Math.max(0, Math.min(100, pct));
    fill.style.width = clampedPct + '%';
    valueOverlay.textContent = val;
    valueOverlay.style.backgroundImage =
      `linear-gradient(90deg, #fff 0%, #fff ${clampedPct}%, #000 ${clampedPct}%, #000 100%)`;
  }

  updateFill(vaseControls.get(key));

  input.addEventListener('input', () => {
    const val = parseFloat(input.value);
    updateFill(val);
    vaseControls.set(key, val);
  });

  vaseControls.onChange(key, (val) => {
    input.value = val;
    updateFill(val);
  });

  function applyRange() {
    const newMin = parseFloat(minInput.value);
    const newMax = parseFloat(maxInput.value);
    if (isNaN(newMin) || isNaN(newMax) || newMax <= newMin) {
      rangeRow.classList.add('slider-shake');
      setTimeout(() => rangeRow.classList.remove('slider-shake'), 300);
      minInput.value = curMin;
      maxInput.value = curMax;
      return;
    }
    curMin = newMin;
    curMax = newMax;
    input.min = curMin;
    input.max = curMax;
    let val = parseFloat(input.value);
    if (val < curMin) { val = curMin; input.value = val; vaseControls.set(key, val); }
    if (val > curMax) { val = curMax; input.value = val; vaseControls.set(key, val); }
    updateFill(val);
  }

  minInput.addEventListener('change', applyRange);
  maxInput.addEventListener('change', applyRange);

  wrap.appendChild(fill);
  wrap.appendChild(valueOverlay);
  wrap.appendChild(input);
  group.appendChild(labelRow);
  group.appendChild(wrap);
  return group;
}

      stickerImages.splice(i, 1);
      if (selectedStickerIndex >= stickerImages.length) {
        setSelectedStickerIndex(Math.max(0, stickerImages.length - 1));
      }
      rebuildStickerGallery();
    });
    thumb.addEventListener('click', () => {
      setSelectedStickerIndex(i);
      grid.querySelectorAll('.ct-multi-thumb').forEach(t => t.classList.remove('selected'));
      thumb.classList.add('selected');
    });
    thumb.append(thumbImg, rm);
    grid.appendChild(thumb);
  });

  const addBtn = document.createElement('div');
  addBtn.className = 'ct-multi-add';
  addBtn.textContent = '+';
  const fi = document.createElement('input');
  fi.type = 'file';
  fi.accept = 'image/*';
  fi.multiple = true;
  fi.addEventListener('change', () => {
    const files = Array.from(fi.files);
    let loaded = 0;
    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          stickerImages.push(img);
          loaded++;
          if (loaded === files.length) {
            if (stickerImages.length === loaded) setSelectedStickerIndex(0);
            rebuildStickerGallery();
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
    fi.value = '';
  });
  addBtn.appendChild(fi);
  grid.appendChild(addBtn);
  counter.textContent = stickerImages.length + ' images';
}

rebuildStickerGallery();
stickPanel.appendChild(grid);
stickPanel.appendChild(counter);

stickPanel.appendChild(createSlider('Sticker Scale', 'stickerScale', 10, 200));
stickPanel.appendChild(createSlider('Sticker Rotation', 'stickerRotation', 0, 360));
stickPanel.appendChild(createToggle('Randomize', 'stickerRandomize'));
stickPanel.appendChild(createSeparator());
stickPanel.appendChild(createButton('Clear Stickers', 'clearStickers'));

// Interaction & Mode Switching

function updateMode(mode) {
  for (const m of MODES) {
    tabElements[m].classList.toggle('active', m === mode);
    panelElements[m].classList.toggle('active', m === mode);
  }

  renderer.domElement.style.cursor =
    mode === 'Draw' ? 'crosshair' :
    mode === 'Stick' ? 'copy' : 'default';

  updateHandleEditorVisibility();
}

function updateHandleEditorVisibility() {
  const showH = vaseControls.get('showHandles');
  const heWrap = getHandleEditorWrap();
  if (heWrap) {
    heWrap.style.display = showH ? '' : 'none';
  }
  if (handleThicknessControl) {
    handleThicknessControl.style.display = showH ? '' : 'none';
  }
}

vaseControls.onChange('toolMode', updateMode);

vaseControls.onChange('showHandles', () => {
  setHandleDirty(true);
  buildHandles();
  updateHandleEditorVisibility();
});

updateHandleEditorVisibility();

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

// Mouse/Pointer Events
let isPainting = false;
let lastPaintUV = null;

renderer.domElement.addEventListener('pointerdown', (e) => {
  const mode = vaseControls.get('toolMode');

  if (mode === 'Draw') {
    isPainting = true;
    const uv = getUV(e);
    if (uv) {
      paint(
        uv,
        vaseControls.get('brushSize'),
        vaseControls.get('brushColor'),
        vaseControls.get('brushOpacity'),
        vaseControls.get('eraser')
      );
      lastPaintUV = uv;
    }
  } else if (mode === 'Stick') {
    const uv = getUV(e);
    if (uv) placeSticker(uv);
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouseNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouseNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  const mode = vaseControls.get('toolMode');
  if (mode === 'Draw' && isPainting) {
    const uv = getUV(e);
    if (uv) {
      if (lastPaintUV) {
        interpolatedPaint(
          lastPaintUV, uv,
          vaseControls.get('brushSize'),
          vaseControls.get('brushColor'),
          vaseControls.get('brushOpacity'),
          vaseControls.get('eraser')
        );
      } else {
        paint(
          uv,
          vaseControls.get('brushSize'),
          vaseControls.get('brushColor'),
          vaseControls.get('brushOpacity'),
          vaseControls.get('eraser')
        );
      }
      lastPaintUV = uv;
    }
  }
});

renderer.domElement.addEventListener('pointerup', () => {
  isPainting = false;
  lastPaintUV = null;
});

renderer.domElement.addEventListener('pointerleave', () => {
  isPainting = false;
  lastPaintUV = null;
});

setInterval(() => {
  if (!isPainting || vaseControls.get('toolMode') !== 'Draw' || !getVaseMesh()) return;
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObject(getVaseMesh(), false);
  if (hits.length > 0 && hits[0].uv) {
    paint(
      hits[0].uv.clone(),
      vaseControls.get('brushSize') * 0.8,
      vaseControls.get('brushColor'),
      vaseControls.get('brushOpacity') * 0.6,
      vaseControls.get('eraser')
    );
  }
}, 30);

// Control Callbacks

vaseControls.onChange('baseColor', (color) => {
  fillBaseColor(color);
  compositeTexture();
  for (const m of getHandleMeshes()) {
    if (m.material) m.material.color.set(color);
  }
});

vaseControls.onChange('roughness', (val) => {
  const r = val / 100;
  vaseMaterial.roughness = r;
  for (const m of getHandleMeshes()) {
    if (m.material) m.material.roughness = r;
  }
});

vaseControls.onChange('metalness', (val) => {
  const mVal = val / 100;
  vaseMaterial.metalness = mVal;
  for (const m of getHandleMeshes()) {
    if (m.material) m.material.metalness = mVal;
  }
});

vaseControls.onChange('vasePreset', (id) => {
  if (PRESETS[id]) {
    setCurrentProfile([...PRESETS[id]]);
    setProfileDirty(true);
    buildVase();
    drawProfileEditor();
  }
});

vaseControls.onChange('profileSmoothing', () => {
  setProfileDirty(true);
  buildVase();
  drawProfileEditor();
});

vaseControls.onChange('latheSegments', () => {
  setProfileDirty(true);
  buildVase();
});

vaseControls.onChange('handleThickness', () => {
  setHandleDirty(true);
  buildHandles();
});

// Actions
vaseControls.onAction('clearProfile', () => {
  setCurrentProfile([...PRESETS.classic]);
  setProfileDirty(true);
  buildVase();
  drawProfileEditor();
});

vaseControls.onAction('clearTexture', () => {
  fillBaseColor(vaseControls.get('baseColor'));
  stickerCtx.clearRect(0, 0, TEX, TEX);
  compositeTexture();
});

vaseControls.onAction('clearHandles', () => {
  setHandleProfile([[0, 0.6], [0.4, 0.8], [0.6, 1.0], [0.4, 1.2], [0, 1.4]]);
  setHandleDirty(true);
  buildHandles();
  drawHandleEditor();
});

vaseControls.onAction('clearStickers', () => {
  stickerCtx.clearRect(0, 0, TEX, TEX);
  compositeTexture();
});

// Animation Loop

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  const speed = vaseControls.get('wheelSpeed') / 100;
  wheelGroup.rotation.y += speed * dt * 2;

  if (isProfileDirty()) buildVase();
  if (isHandleDirty()) buildHandles();

  renderer.render(scene, camera);
}

animate();
  </script>
</body>
